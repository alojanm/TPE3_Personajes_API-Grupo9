<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Personajes - Game of Thrones</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #1f2a30; 
            color: #e6e6e6;
            font-family: Georgia, serif;
        }

        /* ENCABEZADO */
        .encabezado {
            padding: 10px;
            text-align: center;
        }

        /* TITULO */
        .titulo-serie {
            color: #e6c76b; 
            font-weight: bold;
            letter-spacing: 2px;
        }

        /* LOGO CORREGIDO */
        .logo-serie {
            width: 200px;
            height: 150px;
            object-fit: contain; 
            padding: 8px;
        }

        /* MENU */
        .menu a {
            color: #8fb3c2;
            text-decoration: none;
            font-weight: bold;
            margin: 0 5px;
            transition: 0.3s;
        }

        .menu a:hover {
            color: #e4321a;
        }

        /* TITULO PRINCIPAL */
        .titulo-principal {
            text-align: center;
            margin-top: 10px;
            margin-bottom: 20px;
            color: #b8d4df;
        }

        /* CARD PERSONAJES */
        .personaje-card {
            background-color: #2a3942;
            border: 1px solid #3f5661;
            min-height: 220px;
            display: flex;
            overflow: hidden;
            transition: 0.3s;
            border-radius: 8px;
        }

        .personaje-card:hover {
            transform: scale(1.02);
            border-color: #f8dd44;
        }

        /* IMAGEN PERSONAJE */
        .personaje-imagen {
            width: 180px;
            height: 220px;
            object-fit: cover;
            border-right: 1px solid #3f5661;
        }

        /* INFO */
        .personaje-info {
            padding: 15px;
            flex: 1;
        }

        .personaje-info h5 {
            color: #e6c76b;
            font-weight: bold;
        }

        .dato {
            margin-bottom: 8px;
            color: #d7d7d7;
        }

        /* FOOTER */
        footer {
            text-align: center;
            margin-top: 30px;
            margin-bottom: 20px;
            color: #8fb3c2;
            font-weight: bold;
        }
    </style>

</head>

<body>

    <div class="container-fluid px-4">

        <!-- ENCABEZADO -->

        <div class="encabezado">

            <div class="row align-items-center">

                <div class="col-md-8">
                    <h1 class="titulo-serie">
                        GAME OF THRONES
                    </h1>
                </div>

                <div class="col-md-4">
                    
                    <img src="LOGO.jpg" class="logo-serie">
                </div>

            </div>

        </div>

        <!-- MENU -->

        <div class="menu text-center mb-4">

            <a href="index.html">PRINCIPAL</a> |

            <a href="personajes.html">PERSONAJES</a>

        </div>

        

        <h2 class="titulo-principal">
            PERSONAJES DE LA SERIE
        </h2>

        <!-- CONTENEDOR -->

        <div class="row" id="contenedorPersonajes">

        </div>

        <footer>
            PRESENTACIÓN DE 20 PERSONAJES DE GAME OF THRONES
        </footer>

    </div>

    <script>

        fetch("https://thronesapi.com/api/v2/Characters")

            .then(response => response.json())

            .then(data => {

                const contenedor =
                    document.getElementById("contenedorPersonajes");

                data.slice(0, 20).forEach(personaje => {

                    const columna =
                        document.createElement("div");

                    columna.className = "col-md-6 mb-4";

                    columna.innerHTML = `

                        <div class="personaje-card">

                            <img
                                src="${personaje.imageUrl}"
                                alt="${personaje.fullName}"
                                class="personaje-imagen">

                            <div class="personaje-info">

                                <h5>${personaje.fullName}</h5>

                                <p class="dato">
                                    <strong>ID:</strong>
                                    ${personaje.id}
                                </p>

                                <p class="dato">
                                    <strong>Título:</strong>
                                    ${personaje.title}
                                </p>

                                <p class="dato">
                                    <strong>Familia:</strong>
                                    ${personaje.family}
                                </p>

                            </div>

                        </div>

                    `;

                    contenedor.appendChild(columna);

                });

            })

            .catch(error => {

                console.error("Error:", error);

            });

    </script>

</body>

</html>
