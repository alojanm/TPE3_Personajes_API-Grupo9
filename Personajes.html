<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Personajes - Game of Thrones</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #111111;
            color: white;
            font-family: Georgia, serif;
        }

        .encabezado {
            padding: 30px;
            text-align: center;
        }

        .titulo-serie {
            color: #d4af37;
            font-weight: bold;
        }

        .logo-serie {
            width: 140px;
            height: 140px;
            object-fit: cover;
            border: 3px solid #d4af37;
            border-radius: 50%;
        }

        .menu a {
            color: #d4af37;
            text-decoration: none;
            font-weight: bold;
            margin: 0 10px;
        }

        .menu a:hover {
            color: white;
        }

        .titulo-principal {
            text-align: center;
            margin-top: 20px;
            margin-bottom: 35px;
            color: #d4af37;
        }

        .personaje-card {
            background-color: #1b1b1b;
            border: 2px solid #d4af37;
            min-height: 220px;
            display: flex;
            overflow: hidden;
            transition: 0.3s;
        }

        .personaje-card:hover {
            transform: scale(1.02);
        }

        .personaje-imagen {
            width: 180px;
            height: 220px;
            object-fit: cover;
            border-right: 2px solid #d4af37;
        }

        .personaje-info {
            padding: 15px;
            flex: 1;
        }

        .personaje-info h5 {
            color: #d4af37;
            font-weight: bold;
        }

        .dato {
            margin-bottom: 8px;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            margin-bottom: 20px;
            color: #d4af37;
            font-weight: bold;
        }
    </style>

</head>

<body>

    <div class="container">

        <!-- ENCABEZADO -->

        <div class="encabezado">

            <div class="row align-items-center">

                <div class="col-md-8">
                    <h1 class="titulo-serie">
                        GAME OF THRONES
                    </h1>
                </div>

                <div class="col-md-4">
                    <!-- Puedes reemplazar por tu logo -->
                    <img src="LOGO.jpg"
                        class="logo-serie">
                </div>

            </div>

        </div>

        <!-- MENU -->

        <div class="menu text-center mb-4">

            <a href="index.html">PRINCIPAL</a> |

            <a href="personajes.html">PERSONAJES</a>

        </div>

        <!-- TITULO -->

        <h2 class="titulo-principal">
            PERSONAJES DE LA SERIE
        </h2>

        <!-- CONTENEDOR -->

        <div class="row" id="contenedorPersonajes">

        </div>

        <footer>
            PRESENTACIÓN DE 16 PERSONAJES DE GAME OF THRONES
        </footer>

    </div>

    <script>

        fetch("https://thronesapi.com/api/v2/Characters")

            .then(response => response.json())

            .then(data => {

                const contenedor =
                    document.getElementById("contenedorPersonajes");

                data.slice(0, 16).forEach(personaje => {

                    const columna =
                        document.createElement("div");

                    columna.className = "col-md-6 mb-4";

                    columna.innerHTML = `

                        <div class="personaje-card">

                            <img
                                src="${personaje.imageUrl}"
                                alt="${personaje.fullName}"
                                class="personaje-imagen">

                            <div class="personaje-info">

                                <h5>${personaje.fullName}</h5>

                                <p class="dato">
                                    <strong>ID:</strong>
                                    ${personaje.id}
                                </p>

                                <p class="dato">
                                    <strong>Título:</strong>
                                    ${personaje.title}
                                </p>

                                <p class="dato">
                                    <strong>Familia:</strong>
                                    ${personaje.family}
                                </p>

                            </div>

                        </div>

                    `;

                    contenedor.appendChild(columna);

                });

            })

            .catch(error => {

                console.error("Error:", error);

            });

    </script>

</body>

</html>
